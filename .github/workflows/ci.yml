# .github/workflows/ci.yml

name: CARA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgdal-dev gdal-bin

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Debug - List test files
      run: |
        echo "=== Files in tests/ ==="
        ls -la tests/
        echo "=== .gitignore test patterns ==="
        grep -n "test" .gitignore || echo "No test patterns"

    - name: Debug - Collect tests
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost/testdb
        SESSION_SECRET: testsecret
      run: |
        pytest tests/ --collect-only 2>&1 || true

    - name: Run tests
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost/testdb
        SESSION_SECRET: testsecret
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing
