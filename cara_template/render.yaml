databases:
  - name: cara-db
    databaseName: cara
    user: cara
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: cara
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 main:app
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cara-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: FLASK_ENV
        value: production
      - key: AIRNOW_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: FEMA_RAPT_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
