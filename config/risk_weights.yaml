# CARA Risk Assessment Weight Configuration
# This file documents the weights used in risk calculations for transparency.
# NOTE: The actual overall domain weights are defined in utils/data_processor.py
# and use a PHRAT quadratic mean formula (p=2), not a simple linear weighted sum.
# This file is used as a reference and for sub-domain weight configuration.

# Primary PHRAT Domain Weights (must sum to 1.0)
# These are the actual weights used in utils/data_processor.py
# Only data-backed domains are included in the primary PHRAT score
#
# WEIGHT RATIONALE:
# Weights reflect the relative frequency, severity, and breadth of public health
# impact for each hazard type, informed by:
#   - FEMA National Risk Index annualized expected loss data
#   - CDC PHEP (Public Health Emergency Preparedness) capability priorities
#   - State/local Hazard Vulnerability Assessment guidance
#   - Historical disaster declaration frequency (FEMA, 2000-2024)
#
# Natural Hazards (33%): Highest weight because FEMA NRI data shows natural
#   hazards produce the largest annualized expected losses. Covers 4 sub-types
#   (flood, tornado, winter storm, thunderstorm), each with independent data sources.
# Health Metrics (20%): Infectious disease is a core PHEP capability; weighted
#   equally with active shooter to reflect comparable community-wide impact.
# Active Shooter (20%): CDC/ASPR identifies active shooter as a high-consequence
#   threat requiring dedicated PHEP planning; weighted equally with health metrics.
# Air Quality (14%): EPA data shows increasing wildfire smoke episodes;
#   weighted to reflect growing but still geographically uneven impact.
# Extreme Heat (13%): NOAA data shows heat as the leading weather-related cause
#   of death nationally; weighted slightly below air quality.
#
# These weights are configurable. Jurisdictions may adjust them based on local
# hazard profiles and planning priorities. Changes should be documented.
overall_risk_weights:
  natural_hazards: 0.33    # 33% - Natural disasters, weather events (FEMA NRI, CDC SVI, NOAA)
  health_metrics: 0.20     # 20% - Disease surveillance, healthcare capacity (CDC)
  active_shooter: 0.20     # 20% - Active shooter and violence risk (GVA, FBI, Census)
  extreme_heat: 0.13       # 13% - Heat vulnerability and climate risk (NWS, NOAA)
  air_quality: 0.14        # 14% - Environmental health, AQI assessment (EPA AirNow)

# Supplementary Domains (modeled from proxy indicators, NOT included in PHRAT score)
# These are displayed separately on the dashboard for planning context
supplementary_domains:
  cybersecurity: supplementary   # Modeled from proxy indicators (county characteristics + SVI)
  utilities: supplementary       # Modeled from proxy indicators (county characteristics + SVI)

# SVI Adjustment Factors
# Controls how much CDC Social Vulnerability Index themes adjust risk scores.
# Each value is a maximum multiplier increase (e.g., 0.25 = up to 25% increase).
#
# METHODOLOGICAL NOTE ON SVI-CYBERSECURITY LINKAGE:
# Using SVI socioeconomic scores to adjust cybersecurity risk assumes that
# lower-income communities have fewer IT security resources. This is a proxy
# assumption — no direct empirical study links county SVI percentiles to
# cybersecurity breach rates. Reviewers should be aware this could embed
# socioeconomic bias by systematically scoring lower-income jurisdictions as
# higher cybersecurity risk. The adjustment factor is configurable below;
# set cybersecurity_socioeconomic to 0.0 to disable SVI influence entirely.
svi_adjustment_factors:
  natural_hazards_housing: 0.50          # Housing/transportation SVI → natural hazard vulnerability
  extreme_heat_socioeconomic: 0.20       # Socioeconomic SVI → heat vulnerability
  active_shooter_household: 0.30         # Household composition SVI → active shooter vulnerability
  cybersecurity_socioeconomic: 0.25      # Socioeconomic SVI → cybersecurity vulnerability (see note above)
  secondary_socioeconomic_all: 0.25      # Socioeconomic SVI → cross-domain secondary adjustment

# Temporal Risk Component Weights (must sum to 1.0)
# These apply to all risk domains and determine time-based prioritization
temporal_weights:
  # Strategic Planning Mode (default for CARA v2.1+)
  strategic_planning:
    baseline: 0.60    # 60% - Long-term structural risks (1-10 years)
    seasonal: 0.25    # 25% - Predictable cyclical variations
    trend: 0.15       # 15% - Medium-term directional changes
    acute: 0.00       # 0% - Short-term events (shown for context only)
  
  # Emergency Response Mode (future implementation)
  emergency_response:
    baseline: 0.30    # 30% - Background structural risk
    seasonal: 0.20    # 20% - Seasonal context
    trend: 0.10       # 10% - Trend awareness
    acute: 0.40       # 40% - Immediate events drive decisions

# Active Shooter Risk Domain Weights (must sum to 1.0)
active_shooter_weights:
  historical_incident_density: 0.25    # 25% - Past incident patterns
  school_youth_vulnerability: 0.20     # 20% - Educational institution risk
  social_community_fragility: 0.20     # 20% - Social cohesion factors
  mental_behavioral_health: 0.20       # 20% - Mental health indicators
  access_lethal_means: 0.15            # 15% - Firearm accessibility

# Natural Hazards Sub-domain Weights (within natural_hazards domain)
# Each hazard uses the Exposure-Vulnerability-Resilience (EVR) framework
# with climate change projections applied to the exposure component.
# Thunderstorm risk uses independent NOAA Storm Events Database severity data.
natural_hazards_weights:
  flood: 0.25           # Equal weight - FEMA NRI + NOAA climate projections
  tornado: 0.25         # Equal weight - FEMA NRI + NOAA/IPCC climate projections
  winter_storm: 0.25    # Equal weight - FEMA NRI + climate projections
  thunderstorm: 0.25    # Equal weight - NOAA Storm Events Database + EPA/NOAA projections

# EVR Residual Risk Formula (for all natural hazards):
# Risk = (Exposure × Vulnerability) × (2.0 - Resilience) × Health_Impact_Factor
# - Exposure and Vulnerability are multiplicative (not weighted averages)
# - Resilience acts as adjustment: low resilience (0.1) → 1.9x amplifier,
#   high resilience (0.9) → 1.1x amplifier
# - Health Impact Factor from FEMA NRI (typically 0.8-1.5)
# See utils/risk_calculation.py calculate_residual_risk()

# SVI Theme Weights within Vulnerability Component (per hazard type)
# All 4 CDC SVI themes are integrated alongside Census demographic factors.
# Weights vary by hazard type to reflect hazard-specific vulnerability drivers.
natural_hazards_svi_vulnerability_weights:
  flood:
    housing_transportation: 0.30   # Housing quality, flood zone structures
    socioeconomic: 0.20            # Recovery capacity, insurance access
    household_composition: 0.15    # Elderly/disabled evacuation challenges
    minority_status: 0.10          # Language barriers, equitable warning access
    # Census factors: elderly_pct (0.15), mobile_home_pct (0.10)
  tornado:
    housing_transportation: 0.25   # Mobile homes, building structural integrity
    socioeconomic: 0.15            # Shelter access, recovery resources
    household_composition: 0.10    # Vulnerable populations
    minority_status: 0.10          # Warning access, language barriers
    # Census factors: mobile_home_pct (0.25), elderly_pct (0.10), pop_density (0.05)
  winter_storm:
    housing_transportation: 0.20   # Heating infrastructure, vehicle access
    socioeconomic: 0.10            # Heating affordability, weatherization
    household_composition: 0.15    # Elderly cold vulnerability
    minority_status: 0.05          # Language barriers for warnings
    # Census factors: elderly_pct (0.20), mobile_home_pct (0.05), power_grid_vuln (0.15), rural_isolation (0.10)
  thunderstorm:
    housing_transportation: 0.25   # Building stock, structural protection
    socioeconomic: 0.10            # Recovery and insurance
    household_composition: 0.10    # Vulnerable populations
    minority_status: 0.05          # Warning access
    # Census factors: elderly_pct (0.10), mobile_home_pct (0.10), flood_suscept (0.15), tree_coverage (0.15)

# Resilience Component Inputs (per hazard type)
# Resilience score (0-1) is computed from socioeconomic SVI inverse,
# housing SVI inverse, and hazard-specific factors
natural_hazards_resilience_inputs:
  all_hazards:
    socioeconomic_inverse: 0.20    # (1.0 - socioeconomic_svi) × 0.20
    housing_inverse: 0.10          # (1.0 - housing_transportation_svi) × 0.10
    # Plus hazard-specific base resilience factors

# Climate Change Projection Multipliers (applied to exposure component)
# Source: NOAA, IPCC AR6, EPA
# Period: 2030-2050, Baseline: 1986-2005, Scenario: RCP4.5/SSP2-4.5
# Region-specific values stored in data/climate/natural_hazard_climate_projections.json
climate_projection_ranges:
  flood: [1.15, 1.25]        # Increased heavy precipitation events
  tornado: [1.08, 1.15]      # Increased convective instability
  winter_storm: [1.05, 1.12] # More intense storms, ice storm increase +25%
  thunderstorm: [1.12, 1.22] # Increased severe storm environments

# Health Metrics Sub-domain Weights (within health_metrics domain)
health_metrics_weights:
  respiratory_illness: 0.40    # 40% - ILI, COVID, RSV surveillance
  vaccination_coverage: 0.25   # 25% - Community immunity levels
  healthcare_capacity: 0.20    # 20% - Hospital beds, staffing
  vulnerable_populations: 0.15 # 15% - Elderly, immunocompromised

# Extreme Heat Sub-domain Weights (within extreme_heat domain)
extreme_heat_weights:
  vulnerability_index: 0.40    # 40% - CDC Heat Vulnerability Index
  urban_heat_island: 0.30      # 30% - City-specific temperature amplification
  climate_projections: 0.20    # 20% - Long-term temperature trends
  adaptation_capacity: 0.10    # 10% - Cooling centers, infrastructure

# Jurisdiction-Specific Overrides
# Format: jurisdiction_id or county_name
# Example: Override weights for a specific high-risk urban jurisdiction
jurisdiction_overrides:
  # example_county_a:
  #   overall_risk_weights:
  #     active_shooter: 0.25    # Increase active shooter weight for urban area
  #     natural_hazards: 0.28   # Adjust natural hazards weight

# Normalization Configuration
normalization:
  # Method: 'zscore', 'quantile', 'minmax', or 'none'
  # Note: 'zscore' centers values around 0 which can cause near-zero weighted sums
  # Using 'none' preserves the original 0-1 scaled domain scores for proper weighting
  method: 'none'
  
  # Z-score normalization parameters
  zscore:
    # How many standard deviations to consider as outliers
    outlier_threshold: 3.0
    # Whether to clip outliers to threshold
    clip_outliers: true
  
  # Quantile normalization parameters  
  quantile:
    # Quantile range for scaling (e.g., 0.05-0.95 removes extreme 5% on each end)
    lower_quantile: 0.05
    upper_quantile: 0.95

# Contribution Logging Configuration
contribution_logging:
  # Enable detailed variable contribution tracking
  enabled: true
  
  # Number of top contributing variables to log per domain
  top_contributors_count: 5
  
  # Log level for contribution messages
  log_level: 'INFO'
  
  # Include raw variable values in logs
  include_raw_values: true
  
  # Include normalized values in logs
  include_normalized_values: true

# =============================================================================
# EMERGENCY MANAGEMENT DISCIPLINE CONFIGURATION
# =============================================================================
# The following sections define alternative weights for Emergency Management (EM)
# assessments. EM uses the SAME exposure scores and data sources as Public Health,
# but adjusts vulnerability and resilience weights to emphasize critical
# infrastructure impacts rather than population health outcomes.
#
# WEIGHT RATIONALE (EM):
# Weights reflect emergency management priorities informed by:
#   - FEMA Comprehensive Preparedness Guide (CPG) 201
#   - State/local hazard mitigation planning guidance
#   - National Infrastructure Protection Plan (NIPP) framework
#   - EMAP (Emergency Management Accreditation Program) standards
#
# Key differences from Public Health weights:
#   - Natural Hazards increased (38%): Infrastructure damage is the primary EM concern
#   - Utilities elevated to primary (10%): Critical infrastructure disruption is core EM
#   - Extreme Heat increased (15%): Infrastructure stress (power grid, roads)
#   - Health Metrics decreased (12%): Still relevant but secondary to infrastructure
#   - Active Shooter decreased (15%): EM focuses on response, not prevention
#   - Air Quality decreased (10%): Less direct infrastructure impact

em_overall_risk_weights:
  natural_hazards: 0.38    # 38% - Infrastructure damage from natural disasters
  health_metrics: 0.12     # 12% - Healthcare system capacity/surge
  active_shooter: 0.15     # 15% - Mass casualty incident response
  extreme_heat: 0.15       # 15% - Power grid stress, infrastructure degradation
  air_quality: 0.10        # 10% - Shelter-in-place, HVAC system impacts
  utilities: 0.10          # 10% - Critical infrastructure disruption (elevated from supplementary)

# EM Vulnerability Weights within EVR Natural Hazards
# Shifts emphasis from population health to critical infrastructure
em_natural_hazards_svi_vulnerability_weights:
  flood:
    housing_transportation: 0.35   # Critical infrastructure in flood zones
    socioeconomic: 0.10            # Recovery funding capacity
    household_composition: 0.05    # Reduced — less EM-specific
    minority_status: 0.05          # Warning/communication access
    infrastructure_density: 0.15   # Roads, bridges, utilities in flood plains
    mobile_home_factor: 0.10       # Temporary housing/shelter needs
    elderly_factor: 0.05           # Evacuation logistics
    rural_isolation: 0.15          # Access/response time challenges
  tornado:
    housing_transportation: 0.30   # Structural vulnerability of buildings
    socioeconomic: 0.10            # Debris removal, recovery resources
    household_composition: 0.05    # Reduced — less EM-specific
    minority_status: 0.05          # Warning access
    infrastructure_density: 0.15   # Power lines, cell towers, critical facilities
    mobile_home_factor: 0.25       # Highest structural risk
    elderly_factor: 0.05           # Shelter logistics
    pop_density: 0.05              # Scale of impact
  winter_storm:
    housing_transportation: 0.25   # Road clearance, transportation networks
    socioeconomic: 0.05            # Reduced — less EM-specific
    household_composition: 0.05    # Reduced
    minority_status: 0.05          # Communication barriers
    power_grid_vulnerability: 0.25 # Grid failure, heating systems
    rural_isolation: 0.20          # Road access, emergency response time
    mobile_home_factor: 0.05       # Heating vulnerability
    elderly_factor: 0.10           # Welfare check logistics
  thunderstorm:
    housing_transportation: 0.30   # Structural damage, tree coverage
    socioeconomic: 0.05            # Recovery resources
    household_composition: 0.05    # Reduced
    minority_status: 0.05          # Warning access
    infrastructure_density: 0.15   # Power lines, communication towers
    tree_coverage: 0.15            # Debris, power line damage
    flood_susceptibility: 0.15     # Flash flooding from storms
    mobile_home_factor: 0.10       # Structural vulnerability

# EM Resilience Component Inputs
# Emphasizes infrastructure preparedness and mutual aid over social resilience
em_resilience_inputs:
  all_hazards:
    socioeconomic_inverse: 0.10        # Reduced from PH (0.20) — less direct relevance
    housing_inverse: 0.15              # Increased — infrastructure quality proxy
    infrastructure_preparedness: 0.25  # EM-specific: mutual aid, equipment, plans
    response_capacity: 0.25            # EM-specific: staffing, vehicles, EOC capability
    communication_systems: 0.15        # Warning systems, backup communications
    backup_power: 0.10                 # Generator coverage, grid redundancy

