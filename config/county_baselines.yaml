# CARA Jurisdiction Baseline Scores
# TEMPLATE VERSION: Replace with your jurisdiction's baseline data.
#
# These values are proxy-derived baseline scores used when real-time data
# is unavailable. See config/risk_weights.yaml for proxy indicator source citations.
# All scores are on a 0.0-1.0 scale.
#
# INSTRUCTIONS:
# 1. Replace the 5 example jurisdictions below with your actual jurisdictions
# 2. Adjust scores based on local data sources (see comments for methodology)
# 3. The _default value is used for any jurisdiction not explicitly listed

# Cybersecurity Domain Baselines
# Source citations for each component are documented in the comments.
cybersecurity:
  # THREAT LANDSCAPE COMPONENT
  # Proxy: Population size and institutional presence
  # Higher population and more government/healthcare institutions = higher target visibility
  threat:
    Example County A: 0.65    # Large metro, healthcare/finance hub
    Example County B: 0.60    # Mid-size metro, government center
    Example County C: 0.52    # Suburban, moderate institutional presence
    Example County D: 0.48    # Small city, limited institutional presence
    Example County E: 0.42    # Rural, minimal institutional presence
    _default: 0.48

  # VULNERABILITY COMPONENT
  # Proxy: Per-capita revenue and urban/rural classification
  # Lower revenue and rural classification = less IT modernization budget
  vulnerability:
    Example County A: 0.60    # Mixed: large budget but aging legacy systems
    Example County B: 0.52    # Moderate per-capita revenue
    Example County C: 0.58    # Mid-range revenue, mixed infrastructure
    Example County D: 0.65    # Lower revenue, budget constraints
    Example County E: 0.72    # Rural, lowest per-capita IT resources
    _default: 0.62

  # CAPABILITY COMPONENT (organizational readiness)
  # Proxy: Government staffing levels and urban/rural classification
  # NOTE: Higher score = BETTER capability (inverted for risk calculation in code)
  capability:
    Example County A: 0.65    # Dedicated IT security staff
    Example County B: 0.62    # Moderate staffing
    Example County C: 0.58    # Some gaps in staffing
    Example County D: 0.52    # Limited specialized IT staff
    Example County E: 0.45    # Rural, minimal specialized staffing
    _default: 0.55

# Extreme Heat Domain Baselines
# All scores are on a 0.0-1.0 scale.
extreme_heat:
  # EXPOSURE COMPONENT
  # Proxy: Climate normals average July maximum temperatures
  # Higher summer temps = higher heat exposure
  exposure:
    Example County A: 0.62    # Urban heat island amplification
    Example County B: 0.58    # Moderate urban heat island
    Example County C: 0.55    # Suburban
    Example County D: 0.50    # Small city
    Example County E: 0.40    # Rural, northern/cooler
    _default: 0.50

  # VULNERABILITY COMPONENT
  # Proxy: Elderly % and poverty rate; CDC SVI housing theme
  # Higher elderly %, poverty, and older housing stock = higher heat vulnerability
  vulnerability:
    Example County A: 0.70    # Higher poverty rate, aging housing stock
    Example County B: 0.52    # Mixed urban/rural
    Example County C: 0.45    # Lower poverty, newer housing
    Example County D: 0.58    # Moderate poverty, mixed demographics
    Example County E: 0.62    # Rural, higher elderly %, remote
    _default: 0.52

  # RESILIENCE COMPONENT
  # Proxy: Healthcare access, urbanization level, population density
  # NOTE: Higher score = BETTER resilience (inverted for risk calculation in code)
  resilience:
    Example County A: 0.58    # Many resources but high per-capita demand
    Example County B: 0.62    # Urban core with hospital access
    Example County C: 0.68    # Well-resourced, suburban healthcare access
    Example County D: 0.53    # Limited public cooling infrastructure
    Example County E: 0.38    # Rural, limited healthcare infrastructure
    _default: 0.50

# Fallback Scores
# Used when actual data is unavailable for a domain.
# All fallbacks use 0.5 (midpoint of 0-1 scale) to represent maximum uncertainty.
# This is the statistically neutral choice: it does not bias the overall score
# up or down when a domain's data is missing.
#
# RATIONALE: A score of 0.5 on a 0-1 scale represents "no information" —
# the jurisdiction could be anywhere from low to high risk. Using 0.5 ensures
# that missing data does not directionally bias the PHRAT score.
fallback_scores:
  natural_hazards: 0.5     # No hazard data → assume median risk
  health_metrics: 0.5      # No health data → assume median risk
  active_shooter: 0.5      # No active shooter data → assume median risk
  extreme_heat: 0.5        # No heat data → assume median risk
  air_quality: 0.5         # No air quality data → assume median risk
  cybersecurity: 0.5       # No cyber data → assume median risk
  utilities: 0.5           # No utilities data → assume median risk
  svi_theme: 0.5           # No SVI data → assume median vulnerability
