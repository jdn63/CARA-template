profile: international
name: "International / Sub-national Entity"
description: >
  Configuration profile for countries, provinces, districts, Tribal territories,
  and other sub-national entities outside the United States.
  Uses globally available data connectors and the WHO IHR assessment framework.

assessment_framework: who_ihr

geographic:
  source: gadm
  boundary_level: adm2
  projection: EPSG:4326
  coordinate_order: lon_lat

units:
  temperature: celsius
  distance: kilometers
  area: square_kilometers

connectors:
  air_quality: openaq
  weather_alerts: noaa_gsod
  health_metrics: who_gho
  disaster_history: em_dat
  hazard_index: em_dat
  social_vulnerability: worldbank
  disease_surveillance: who_gho
  conflict_events: acled
  displacement: idmc
  boundaries: gadm

domains:
  enabled:
    - natural_hazards
    - health_metrics
    - air_quality
    - extreme_heat
    - vector_borne_disease
    - mass_casualty
    - conflict_displacement
  disabled:
    - dam_failure

domain_config:
  mass_casualty:
    us_subtype: false
    include_firearm_data: false
    data_sources:
      - em_dat
      - acled
      - who_gho
    event_types:
      - terrorism
      - mass_violence
      - crowd_crush
      - industrial_accident

  conflict_displacement:
    acled_event_types:
      - battles
      - explosions_remote_violence
      - violence_against_civilians
      - protests
      - riots
    displacement_metrics:
      - internally_displaced
      - refugees_generated
      - returnees
    lookback_years: 3

  natural_hazards:
    climate_projections: cmip6
    data_source: em_dat

  vector_borne_disease:
    diseases:
      - malaria
      - dengue
      - yellow_fever
      - zika
      - chikungunya
    use_who_surveillance: true

weights:
  natural_hazards: 0.25
  conflict_displacement: 0.20
  health_metrics: 0.17
  mass_casualty: 0.12
  air_quality: 0.10
  extreme_heat: 0.10
  vector_borne_disease: 0.06

regional_grouping:
  enabled: true
  label: "Region"
  description: >
    Sub-national groupings using GADM administrative level 1 (states, provinces,
    regions, governorates) or a custom grouping defined in jurisdiction.yaml.

action_plan:
  framework: who_ihr
  core_capacities:
    - legislation_policy_financing
    - ihr_coordination_communication_advocacy
    - antimicrobial_resistance
    - zoonotic_disease
    - food_safety
    - biosafety_biosecurity
    - immunization
    - national_laboratory_system
    - real_time_surveillance
    - reporting
    - workforce_development
    - preparedness
    - emergency_response_operations
    - linking_public_health_security
    - points_of_entry
    - chemical_events
    - radiation_emergencies

export:
  hva_compatible: false
  formats:
    - pdf
    - excel
    - geojson

displacement_response:
  unhcr_integration: true
  camp_capacity_tracking: false
  protection_cluster_alignment: true
